<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#1d222b"/>
      <stop offset="100%" stop-color="#0f1115"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0bc6c"/>
      <stop offset="100%" stop-color="#a9822f"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- outer vault ring -->
  <circle cx="256" cy="248" r="146" fill="none" stroke="url(#gold)" stroke-width="10" opacity="0.9"/>
  <circle cx="256" cy="248" r="120" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.45"/>

  <!-- spokes, referencing a vault-door wheel -->
  <g stroke="url(#gold)" stroke-width="6" stroke-linecap="round" opacity="0.8">
    <line x1="256" y1="128" x2="256" y2="158"/>
    <line x1="256" y1="338" x2="256" y2="368"/>
    <line x1="136" y1="248" x2="166" y2="248"/>
    <line x1="346" y1="248" x2="376" y2="248"/>
    <line x1="171" y1="163" x2="192" y2="184"/>
    <line x1="320" y1="312" x2="341" y2="333"/>
    <line x1="341" y1="163" x2="320" y2="184"/>
    <line x1="192" y1="312" x2="171" y2="333"/>
  </g>

  <!-- keyhole -->
  <circle cx="256" cy="222" r="30" fill="url(#gold)"/>
  <path d="M 238 240 L 274 240 L 262 296 L 250 296 Z" fill="url(#gold)"/>

  <!-- baseline: quiet horizon line, evokes a ledger / directory -->
  <line x1="176" y1="420" x2="336" y2="420" stroke="url(#gold)" stroke-width="4" opacity="0.5"/>
</svg>
